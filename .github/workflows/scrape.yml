name: Scrape Twitter feeds

on:
  schedule:
    # every 15 minutes (GitHub may delay 10-30 min during peak)
    - cron: '*/15 * * * *'
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'users.txt'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Hydrate feeds/ from last published Pages
        # Brings the previously-deployed feed xml/json files into the runner
        # so scraper.py can merge them with the fresh scrape, accumulating history.
        run: |
          mkdir -p feeds
          BASE="https://melroseee-e.github.io/twitter-rss"
          while IFS= read -r u; do
            u="$(echo "$u" | xargs)"        # trim
            [ -z "$u" ] && continue
            [[ "$u" =~ ^# ]] && continue
            for ext in xml json; do
              curl -sL --max-time 25 --retry 2 \
                -o "feeds/${u}.${ext}" \
                -w "  hydrated $u.$ext %{http_code} %{size_download}B\n" \
                "${BASE}/${u}.${ext}" || true
              # Drop 404 placeholder files
              if ! grep -qE "<(rss|entry)|^\\{" "feeds/${u}.${ext}" 2>/dev/null; then
                rm -f "feeds/${u}.${ext}"
              fi
            done
          done < users.txt

      - name: Run scraper
        run: python3 scraper.py

      - name: Build Pages site (index + feeds)
        run: |
          mkdir -p _site
          cp -r feeds/* _site/ 2>/dev/null || true
          {
            echo '<!doctype html><meta charset=utf-8><title>Twitter RSS</title>'
            echo '<style>body{font-family:system-ui;max-width:720px;margin:2rem auto;padding:0 1rem}li{margin:.3rem 0}code{background:#f3f3f3;padding:.1em .4em;border-radius:3px}</style>'
            echo '<h1>Twitter → RSS / JSON Feed</h1>'
            echo '<p>Powered by xcancel.com. Auto-refresh every 15 min via GitHub Actions.</p>'
            echo '<ul>'
            for f in _site/*.xml; do
              [ -e "$f" ] || continue
              name=$(basename "$f" .xml)
              echo "<li><strong>@$name</strong> — <a href=\"$name.xml\">RSS</a> · <a href=\"$name.json\">JSON Feed</a></li>"
            done
            echo '</ul>'
          } > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
