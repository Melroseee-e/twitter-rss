name: Scrape Twitter feeds

on:
  schedule:
    # every 15 minutes (GitHub may delay 10-30 min during peak)
    - cron: '*/15 * * * *'
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'users.txt'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Hydrate feeds/ from last published Pages
        # Brings the previously-deployed feed xml/json files into the runner
        # so scraper.py and accumulate.py can merge them with the fresh fetch,
        # accumulating history across runs.
        run: |
          mkdir -p feeds
          BASE="https://melroseee-e.github.io/twitter-rss"
          download_if_feed() {
            local name="$1" ext="$2"
            curl -sL --max-time 40 --retry 2 -o "feeds/${name}.${ext}" \
              "${BASE}/${name}.${ext}" || return 0
            if ! grep -qE "<(rss|entry)|^\\{" "feeds/${name}.${ext}" 2>/dev/null; then
              rm -f "feeds/${name}.${ext}"
            fi
          }
          # Twitter users (.xml + .json)
          while IFS= read -r line; do
            u=$(echo "$line" | awk '{print $1}')
            [ -z "$u" ] && continue
            [[ "$u" =~ ^# ]] && continue
            download_if_feed "$u" xml
            download_if_feed "$u" json
          done < users.txt
          # Accumulated external feeds (.xml only)
          while IFS= read -r line; do
            name=$(echo "$line" | awk '{print $1}')
            [ -z "$name" ] && continue
            [[ "$name" =~ ^# ]] && continue
            download_if_feed "$name" xml
          done < accumulate.txt
          ls -la feeds/ | head -40

      - name: Run Twitter scraper
        run: python3 scraper.py

      - name: Run accumulator (podcast / AI / crypto mirrors)
        env:
          RSSHUB_KEY: ${{ secrets.RSSHUB_KEY }}
        run: python3 accumulate.py

      - name: Build Pages site (index + feeds)
        run: |
          mkdir -p _site
          cp -r feeds/* _site/ 2>/dev/null || true
          {
            echo '<!doctype html><meta charset=utf-8><title>Twitter RSS</title>'
            echo '<style>body{font-family:system-ui;max-width:720px;margin:2rem auto;padding:0 1rem}li{margin:.3rem 0}code{background:#f3f3f3;padding:.1em .4em;border-radius:3px}</style>'
            echo '<h1>Twitter → RSS / JSON Feed</h1>'
            echo '<p>Powered by xcancel.com. Auto-refresh every 15 min via GitHub Actions.</p>'
            echo '<ul>'
            for f in _site/*.xml; do
              [ -e "$f" ] || continue
              name=$(basename "$f" .xml)
              echo "<li><strong>@$name</strong> — <a href=\"$name.xml\">RSS</a> · <a href=\"$name.json\">JSON Feed</a></li>"
            done
            echo '</ul>'
          } > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
